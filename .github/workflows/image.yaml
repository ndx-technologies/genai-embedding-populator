name: images

on: [push]

permissions: read-all

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: code
        uses: actions/checkout@v4

      - name: go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.26

      - name: docker
        uses: docker/setup-buildx-action@v3

      - name: registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/heads/* ]]; then
            echo "TAG=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          else
            echo "TAG=latest" >> $GITHUB_ENV
          fi

      - name: build and push
        env:
          GOEXPERIMENT: jsonv2
          CGO_ENABLED: "0"
          GOOS: linux
        run: |
          go mod download

          services=(
              "genai-embedding-populator-job"
              "genai-embedding-populator-worker"
          )

          for service in "${services[@]}"; do
              go build -ldflags '-s -w' -o main ./cmd/$service

              cp Dockerfile ./cmd/$service
              cp main ./cmd/$service

              cd ./cmd/$service

              docker buildx build \
                  --platform linux/amd64 \
                  --push \
                  --tag "ghcr.io/${{ github.repository }}/$service:$TAG" \
                  .
              
              cd ../..
          done
